name: Deploy Sirenszen

on:
  push:
    branches:
      - main
      - claude/portfolio-scroll-animations-QpKAF
    paths:
      - 'clients/sirenszen/**'
      - '.github/workflows/deploy-sirenszen.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: clients/sirenszen

      - id: deploy
        uses: actions/deploy-pages@v4
